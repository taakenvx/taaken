<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>taaken</title>
  <meta name="description" content="taaken — web developer" />
  <link rel="icon" href="https://github.com/taakenvx.png" />

  <!-- JetBrains Mono para tudo -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet" />

  <style>
    /* =============================================
       TOKENS — preto/branco/blur, não mude isso
    ============================================= */
    :root {
      --bg:           #050505;
      --surface:      rgba(255,255,255,0.035);
      --surface-2:    rgba(255,255,255,0.065);
      --border:       rgba(255,255,255,0.08);
      --border-2:     rgba(255,255,255,0.15);
      --text:         #f0f0f0;
      --muted:        rgba(240,240,240,0.38);
      --muted-2:      rgba(240,240,240,0.58);
      --green:        #3ba55c;
      --font:         'JetBrains Mono', monospace;
      --font-display: 'Bodoni Moda', Georgia, serif;
    }

    /* =============================================
       RESET
    ============================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 1rem;
      overflow-x: hidden;
    }

    /* =============================================
       BACKGROUND DA PÁGINA
       Camada 1 — vídeo ou imagem atrás de tudo
    ============================================= */
    #bg-wrap {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* FIX: ambos começam display:none, o JS mostra o correto */
    #bg-video {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      display: none;
    }

    #bg-image {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      display: none;
    }

    #bg-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.74);
    }

    #bg-blur-layer {
      position: absolute;
      inset: 0;
      backdrop-filter: blur(3px);
    }

    /* =============================================
       GRAIN
    ============================================= */
    .grain {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      opacity: 0.05;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 160px;
    }

    /* =============================================
       BOTÃO DE MÚSICA (canto superior direito)
    ============================================= */
    #music-btn {
      position: fixed;
      top: 1.1rem; right: 1.1rem;
      z-index: 200;
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 1px solid var(--border-2);
      background: rgba(10,10,10,0.75);
      backdrop-filter: blur(14px);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--muted-2);
      transition: background .2s, color .2s;
    }
    #music-btn:hover { background: var(--surface-2); color: #fff; }
    #music-btn svg { width: 15px; height: 15px; }
    #music-btn.active { color: #fff; border-color: rgba(255,255,255,0.28); }
    #music-btn.active::before {
      content: '';
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.14);
      animation: pulse-ring 1.9s ease-out infinite;
    }
    @keyframes pulse-ring {
      0%   { transform: scale(1);    opacity: .5; }
      100% { transform: scale(1.55); opacity: 0;  }
    }

    /* =============================================
       CARD
    ============================================= */
    .page {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 400px;
    }

    .card {
      background: rgba(6,6,6,0.85);
      backdrop-filter: blur(40px) saturate(140%);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      box-shadow:
        0 0 0 .5px rgba(255,255,255,0.04),
        0 24px 72px rgba(0,0,0,.75),
        inset 0 1px 0 rgba(255,255,255,0.06);
      animation: fadeUp .65s cubic-bezier(.16,1,.3,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* =============================================
       BANNER (Camada 2 — topo do card)
       Separado do background da página
    ============================================= */
    .banner-wrap {
      position: relative;
      height: 108px;
      overflow: hidden;
      background: #111;
    }

    /* banner pode ser <img> ou <video>, ambos com esta classe */
    .banner-media {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      filter: brightness(.5) saturate(.55);
    }

    .banner-fade {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 64px;
      background: linear-gradient(to bottom, transparent, rgba(6,6,6,.92));
      z-index: 1;
    }

    /* =============================================
       CARD BODY
    ============================================= */
    .card-body { padding: 0 1.6rem 1.6rem; }

    /* =============================================
       AVATAR (Camada 3 — separado do banner)
       FIX: sobreposição correta com margin-top negativo
    ============================================= */
    .avatar-row {
      position: relative;
      z-index: 2;
      margin-top: -36px;
      margin-bottom: .9rem;
      width: fit-content;
    }

    .avatar-img {
      width: 78px; height: 78px;
      border-radius: 50%;
      /* borda sólida da cor do card para separar do banner */
      border: 3px solid rgb(6,6,6);
      object-fit: cover;
      display: block;
      background: #111;
    }

    /* =============================================
       NOME + STATUS
    ============================================= */
    .name-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: .45rem;
    }

    /* Bodoni Moda, glow branco — só para o nome */
    .username {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: .02em;
      line-height: 1;
      color: #fff;
      text-shadow:
        0 0 20px rgba(255,255,255,0.50),
        0 0 50px rgba(255,255,255,0.18),
        0 0 100px rgba(255,255,255,0.08);
    }

    .status-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px rgba(59,165,92,.7);
      flex-shrink: 0;
      margin-top: 2px;
    }

    /* =============================================
       TAGLINE — typewriter real
    ============================================= */
    .tagline {
      font-size: .7rem;
      color: var(--muted-2);
      letter-spacing: .03em;
      min-height: 1.1em;
      margin-bottom: .9rem;
    }

    /* cursor piscante */
    #tw-cursor {
      display: inline-block;
      width: 1px;
      height: .85em;
      background: var(--muted-2);
      margin-left: 1px;
      vertical-align: middle;
      animation: tw-blink .75s step-end infinite;
    }
    @keyframes tw-blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* =============================================
       BADGES
    ============================================= */
    .badges-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 1.1rem;
    }

    .badge {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px 3px 8px;
      border-radius: 6px;
      border: 1px solid var(--border);
      font-size: .62rem;
      font-family: var(--font);
      letter-spacing: .07em;
      text-transform: uppercase;
      color: var(--muted-2);
      background: var(--surface);
      overflow: hidden;
      white-space: nowrap;
    }
    .badge svg { width: 11px; height: 11px; flex-shrink: 0; }

    /* ── Verified: reflexo de luz holográfico ── */
    .badge.verified {
      color: #93c5fd;
      border-color: rgba(147,197,253,.22);
      background: rgba(147,197,253,0.05);
    }
    .badge.verified::before {
      content: '';
      position: absolute;
      top: 0; left: -80%;
      width: 55%;
      height: 100%;
      background: linear-gradient(
        108deg,
        transparent 20%,
        rgba(255,255,255,0.6) 40%,
        rgba(200,230,255,0.4) 50%,
        transparent 70%
      );
      transform: skewX(-18deg);
      animation: light-sweep 3s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes light-sweep {
      0%   { left: -80%; opacity: 0; }
      8%   { opacity: 1; }
      44%  { left: 130%; opacity: 1; }
      45%  { opacity: 0; }
      100% { left: 130%; opacity: 0; }
    }
    .badge.verified::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(
        90deg,
        rgba(147,197,253,0)    0%,
        rgba(196,181,253,0.10) 35%,
        rgba(147,197,253,0.14) 65%,
        rgba(167,243,208,0.07) 100%
      );
      background-size: 200% 100%;
      animation: iridescent 3.8s ease infinite;
    }
    @keyframes iridescent {
      0%   { background-position: 0%   0%; }
      50%  { background-position: 100% 0%; }
      100% { background-position: 0%   0%; }
    }

    .badge.dev     { color: #86efac; border-color: rgba(134,239,172,.2); background: rgba(134,239,172,0.04); }
    .badge.og      { color: #fcd34d; border-color: rgba(252,211,77,.2);  background: rgba(252,211,77,0.04);  }
    .badge.premium { color: #c084fc; border-color: rgba(192,132,252,.2); background: rgba(192,132,252,0.04); }
    .badge.owner   { color: #fb923c; border-color: rgba(251,146,60,.2);  background: rgba(251,146,60,0.04);  }

    /* =============================================
       DIVISOR
    ============================================= */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 1rem 0;
    }

    /* =============================================
       CAIXA DE VIEWS
    ============================================= */
    .views-box {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 1rem;
    }
    .views-left {
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
    }
    .views-left svg { width: 13px; height: 13px; }
    .views-label { font-size: .63rem; letter-spacing: .06em; text-transform: uppercase; }
    .views-num   { font-size: .92rem; font-weight: 600; color: var(--text); letter-spacing: -.02em; }

    /* =============================================
       BOTÕES DE ÍCONE SOCIAIS
    ============================================= */
    .socials-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .soc-btn {
      position: relative;
      width: 54px; height: 54px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      text-decoration: none;
      color: var(--muted-2);
      transition: background .2s, border-color .2s,
                  transform .18s cubic-bezier(.16,1,.3,1), box-shadow .18s;
      overflow: visible;
    }

    .soc-btn svg {
      width: 22px; height: 22px;
      position: relative; z-index: 1;
      transition: transform .18s ease, color .18s;
    }

    .soc-btn:hover {
      background: var(--surface-2);
      border-color: var(--border-2);
      transform: translateY(-4px);
      box-shadow: 0 10px 28px rgba(0,0,0,.55);
    }
    .soc-btn:hover svg { transform: scale(1.08); }

    .soc-btn.github:hover  { color: #fff; }
    .soc-btn.discord:hover { color: #7289da; }
    .soc-btn.tiktok:hover  { color: #fff; }
    .soc-btn.mail:hover    { color: #ea4335; }

    /* Tooltip */
    .soc-btn::after {
      content: attr(data-label);
      position: absolute;
      bottom: -22px;
      left: 50%; transform: translateX(-50%) translateY(2px);
      font-size: .59rem;
      font-family: var(--font);
      letter-spacing: .05em;
      color: var(--muted);
      white-space: nowrap;
      opacity: 0;
      transition: opacity .15s, transform .15s;
      pointer-events: none;
    }
    .soc-btn:hover::after { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* =============================================
       FOOTER DO CARD
    ============================================= */
    .card-foot {
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: .58rem;
      color: var(--muted);
      letter-spacing: .07em;
      text-transform: uppercase;
    }

    /* =============================================
       RESPONSIVO
    ============================================= */
    @media (max-width: 440px) {
      .card-body  { padding: 0 1.25rem 1.25rem; }
      .username   { font-size: 1.7rem; }
      .avatar-img { width: 68px; height: 68px; }
    }

    /* =============================================
       REDUCED MOTION
    ============================================= */
    @media (prefers-reduced-motion: reduce) {
      .card { animation: none; opacity: 1; }
      .badge.verified::before,
      .badge.verified::after,
      #music-btn.active::before,
      #tw-cursor { animation: none; }
    }
    /* =============================================
       PRELOADER
    ============================================= */
    #preloader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #050505;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.25rem;
      transition: transform 0.7s cubic-bezier(0.76,0,0.24,1),
                  opacity   0.4s ease;
    }
    #preloader.hide {
      transform: translateY(-100%);
      opacity: 0;
      pointer-events: none;
    }
    .pre-name {
      font-family: var(--font);
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
      min-width: 7ch;
    }
    .pre-cursor { color: #fff; animation: tw-blink 1s step-end infinite; }
    .pre-line-track {
      width: clamp(120px, 30vw, 200px);
      height: 1px;
      background: rgba(255,255,255,0.1);
      border-radius: 1px;
      overflow: hidden;
    }
    .pre-line-fill {
      height: 100%;
      width: 0%;
      background: #fff;
      box-shadow: 0 0 8px rgba(255,255,255,0.6);
      border-radius: 1px;
      transition: width 0.9s cubic-bezier(0.16,1,0.3,1);
    }
    @media (prefers-reduced-motion: reduce) { #preloader { display: none; } }
  </style>
</head>
<body>

  <!-- PRELOADER -->
  <div id="preloader" aria-hidden="true">
    <p class="pre-name" id="preName"><span class="pre-cursor">_</span></p>
    <div class="pre-line-track">
      <div class="pre-line-fill" id="preLineFill"></div>
    </div>
  </div>

  <!-- ÁUDIO -->
  <audio id="bg-music" loop preload="none"></audio>

  <!-- BOTÃO DE MÚSICA -->
  <button id="music-btn" aria-label="Toggle music" title="Toggle music">
    <!-- ícone mudo (padrão) -->
    <svg id="icon-mute" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
      <line x1="23" y1="9" x2="17" y2="15"/>
      <line x1="17" y1="9" x2="23" y2="15"/>
    </svg>
    <!-- ícone tocando -->
    <svg id="icon-sound" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
      <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
      <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
    </svg>
  </button>

  <!-- BACKGROUND DA PÁGINA (camada 1) -->
  <div id="bg-wrap" aria-hidden="true">
    <video id="bg-video" autoplay muted loop playsinline></video>
    <img   id="bg-image" alt="" />
    <div   id="bg-overlay"></div>
    <div   id="bg-blur-layer"></div>
  </div>

  <!-- GRAIN -->
  <div class="grain" aria-hidden="true"></div>

  <!-- CARD -->
  <main class="page">
    <div class="card">

      <!-- BANNER (camada 2 — separado do bg da página) -->
      <div class="banner-wrap" id="bannerWrap">
        <!-- preenchido via JS: <img> ou <video> dependendo do config -->
        <div class="banner-fade"></div>
      </div>

      <div class="card-body">

        <!-- AVATAR (camada 3 — separado do banner) -->
        <div class="avatar-row">
          <img class="avatar-img" id="avatarImg" src="" alt="taaken" />
        </div>

        <!-- NOME + STATUS -->
        <div class="name-row">
          <h1 class="username">taaken</h1>
          <div class="status-dot" title="Online" aria-label="Online"></div>
        </div>

        <!-- TAGLINE TYPEWRITER -->
        <p class="tagline" aria-live="polite">
          <span id="tw-text"></span><span id="tw-cursor"></span>
        </p>

        <!-- BADGES -->
        <div class="badges-row" id="badgesRow" aria-label="Badges"></div>

        <div class="divider" aria-hidden="true"></div>

        <!-- VIEWS -->
        <div class="views-box" aria-label="Total views">
          <div class="views-left">
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
            </svg>
            <span class="views-label">Total Views</span>
          </div>
          <span class="views-num" id="views-count">—</span>
        </div>

        <!-- SOCIAIS -->
        <nav class="socials-row" id="socialsRow" aria-label="Social links"></nav>

        <!-- FOOTER -->
        <div class="card-foot">
          <span>taaken © 2026</span>
          <span>web dev</span>
        </div>

      </div>
    </div>
  </main>

  <!-- CONFIG (edite config.js) -->
  <script src="config.js"></script>

  <script>
  /* ================================================================
     ÍCONES
  ================================================================ */
  const BADGE_ICONS = {
    verified: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>`,
    dev:      `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6zm5.2 0l4.6-4.6L14.6 6 16 7.4 11.4 12l4.6 4.6z"/></svg>`,
    og:       `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01z"/></svg>`,
    premium:  `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 1L9.5 6H3l4.5 4-2 6L12 13l6.5 3-2-6L21 6h-6.5z"/></svg>`,
    owner:    `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M5 16L3 5l5.5 5L12 4l3.5 6L21 5l-2 11H5zm2 3h10v-2H7v2z"/></svg>`,
  };

  const SOCIAL_ICONS = {
    github:  `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/></svg>`,
    discord: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 00-4.885-1.515.074.074 0 00-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 00-5.487 0 12.64 12.64 0 00-.617-1.25.077.077 0 00-.079-.037A19.736 19.736 0 003.677 4.37a.07.07 0 00-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 00.031.057 19.9 19.9 0 005.993 3.03.078.078 0 00.084-.028 14.09 14.09 0 001.226-1.994.076.076 0 00-.041-.106 13.107 13.107 0 01-1.872-.892.077.077 0 01-.008-.128 10.2 10.2 0 00.372-.292.074.074 0 01.077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 01.078.01c.12.098.246.198.373.292a.077.077 0 01-.006.127 12.299 12.299 0 01-1.873.892.077.077 0 00-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 00.084.028 19.839 19.839 0 006.002-3.03.077.077 0 00.032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 00-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>`,
    tiktok:  `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.69a8.18 8.18 0 004.78 1.52V6.74a4.85 4.85 0 01-1.01-.05z"/></svg>`,
    mail:    `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>`,
  };

  /* ================================================================
     INIT
  ================================================================ */
  document.addEventListener('DOMContentLoaded', () => {
    initBackground();
    initBanner();
    initAvatar();
    initBadges();
    initViews();
    initSocials();
    initTypewriter();
    initMusic();
  });

  /* ================================================================
     BACKGROUND DA PÁGINA (camada 1)
     FIX: ambos display:none por padrão no CSS; JS exibe o correto
  ================================================================ */
  function initBackground() {
    const video = document.getElementById('bg-video');
    const image = document.getElementById('bg-image');

    if (CONFIG.videoUrl) {
      video.src = CONFIG.videoUrl;
      video.style.display = 'block';
      // image permanece display:none
    } else if (CONFIG.imageUrl) {
      image.src = CONFIG.imageUrl;
      image.style.display = 'block';
      // video permanece display:none
    }
    // se nenhum configurado, o bg sólido do :root já aparece
  }

  /* ================================================================
     BANNER DO CARD (camada 2)
     Suporta imagem OU vídeo por URL
  ================================================================ */
  function initBanner() {
    const wrap = document.getElementById('bannerWrap');
    const fade = wrap.querySelector('.banner-fade');

    if (CONFIG.bannerVideoUrl) {
      const v = document.createElement('video');
      v.className = 'banner-media';
      v.src = CONFIG.bannerVideoUrl;
      v.autoplay = v.muted = v.loop = true;
      v.setAttribute('playsinline', '');
      wrap.insertBefore(v, fade);
    } else if (CONFIG.bannerUrl) {
      const img = document.createElement('img');
      img.className = 'banner-media';
      img.src = CONFIG.bannerUrl;
      img.alt = '';
      wrap.insertBefore(img, fade);
    } else {
      wrap.style.display = 'none';
    }
  }

  /* ================================================================
     AVATAR (camada 3)
     FIX: imagem sempre visível; GitHub URL correta
  ================================================================ */
  function initAvatar() {
    const img = document.getElementById('avatarImg');
    img.src = CONFIG.avatarUrl || `https://github.com/${CONFIG.githubUser}.png?size=200`;
    img.alt = `${CONFIG.username} avatar`;
    // garante que o elemento seja visível
    img.style.display = 'block';
  }

  /* ================================================================
     BADGES
  ================================================================ */
  function initBadges() {
    const row = document.getElementById('badgesRow');
    row.innerHTML = (CONFIG.badges || []).map(b => `
      <div class="badge ${b.type}" title="${b.label}">
        ${BADGE_ICONS[b.type] || ''}
        <span>${b.label}</span>
      </div>
    `).join('');
  }

  /* ================================================================
     VIEWS — edite baseViews no config.js
  ================================================================ */
  function initViews() {
    const el  = document.getElementById('views-count');
    const key = 'taaken-views-v2';
    let count = parseInt(localStorage.getItem(key) || '0');
    const base = CONFIG.baseViews || 0;
    if (!count || count < base) count = base;
    count++;
    localStorage.setItem(key, String(count));

    // animação de contagem
    let current = Math.max(0, count - 60);
    const step = () => {
      current = Math.min(current + Math.ceil((count - current) * 0.13 + 1), count);
      el.textContent = current.toLocaleString('en-US');
      if (current < count) requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  }

  /* ================================================================
     SOCIAIS
  ================================================================ */
  function initSocials() {
    document.getElementById('socialsRow').innerHTML = (CONFIG.socials || []).map(s => `
      <a href="${s.url}" target="_blank" rel="noopener noreferrer"
         class="soc-btn ${s.icon}" aria-label="${s.label}" data-label="${s.label}">
        ${SOCIAL_ICONS[s.icon] || ''}
      </a>
    `).join('');
  }

  /* ================================================================
     TYPEWRITER — sem ponto final, sem prefixo
     Digita → pausa 2s → apaga → próxima frase
  ================================================================ */
  const twTextEl = document.getElementById('tw-text');
  let twPhrases  = [];
  let twIdx = 0, twChar = 0, twDeleting = false;

  function typeStep() {
    if (!twPhrases.length) return;
    const phrase = twPhrases[twIdx];

    if (!twDeleting) {
      twChar++;
      twTextEl.textContent = phrase.slice(0, twChar);
      if (twChar === phrase.length) {
        twDeleting = true;
        setTimeout(typeStep, 2200);
        return;
      }
    } else {
      twChar--;
      twTextEl.textContent = phrase.slice(0, twChar);
      if (twChar === 0) {
        twDeleting = false;
        twIdx = (twIdx + 1) % twPhrases.length;
      }
    }
    setTimeout(typeStep, twDeleting ? 38 : 62);
  }

  function initTypewriter() {
    // remove ponto final se existir, por segurança
    twPhrases = (CONFIG.taglines || ['web developer']).map(t => t.replace(/\.$/, ''));
    setTimeout(typeStep, 700);
  }

  /* ================================================================
     MÚSICA
     Toca no primeiro clique do usuário (política dos browsers)
     Botão no canto direito para ligar/desligar
  ================================================================ */
  function initMusic() {
    const btn    = document.getElementById('music-btn');
    const audio  = document.getElementById('bg-music');
    const iMute  = document.getElementById('icon-mute');
    const iSound = document.getElementById('icon-sound');

    if (!CONFIG.musicUrl) {
      btn.style.display = 'none';
      return;
    }

    audio.src    = CONFIG.musicUrl;
    audio.volume = 0.35;
    let playing  = false;

    function setPlaying(state) {
      playing = state;
      btn.classList.toggle('active', state);
      iMute.style.display  = state ? 'none' : '';
      iSound.style.display = state ? ''     : 'none';
    }

    function tryPlay() {
      audio.play()
        .then(() => setPlaying(true))
        .catch(() => {/* autoplay bloqueado, aguarda clique */});
    }

    // Tenta tocar no primeiro clique em qualquer lugar da página
    let triggered = false;
    const onFirst = () => {
      if (triggered) return;
      triggered = true;
      tryPlay();
      document.removeEventListener('click',   onFirst);
      document.removeEventListener('keydown', onFirst);
    };
    document.addEventListener('click',   onFirst);
    document.addEventListener('keydown', onFirst);

    // Botão toggle
    btn.addEventListener('click', e => {
      e.stopPropagation(); // não ativa o onFirst
      triggered = true;
      if (playing) {
        audio.pause();
        setPlaying(false);
      } else {
        tryPlay();
      }
    });
  }

  /* ================================================================
     PRELOADER — digita "taaken" + barra de carregamento
  ================================================================ */
  (function () {
    const el      = document.getElementById('preName');
    const fill    = document.getElementById('preLineFill');
    const overlay = document.getElementById('preloader');
    if (!overlay) return;

    const text = 'taaken';
    let i = 0;

    function type() {
      if (i <= text.length) {
        el.innerHTML = text.slice(0, i) + '<span class="pre-cursor">_</span>';
        i++;
        setTimeout(type, i === 1 ? 80 : 75);
      } else {
        setTimeout(() => {
          fill.style.width = '100%';
          setTimeout(() => overlay.classList.add('hide'), 980);
        }, 180);
      }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', () => setTimeout(type, 120));
    } else {
      setTimeout(type, 120);
    }
  })();
  </script>
