<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>taaken</title>
  <meta name="description" content="taaken — web developer" />
  <link rel="icon" href="https://github.com/taakenvx.png" />

  <!-- Bodoni Moda (Vogue aesthetic) for name only -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,400;6..96,700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    /* =============================================
       TOKENS
    ============================================= */
    :root {
      --bg:           #050505;
      --surface:      rgba(255,255,255,0.035);
      --surface-2:    rgba(255,255,255,0.065);
      --border:       rgba(255,255,255,0.08);
      --border-2:     rgba(255,255,255,0.15);
      --text:         #f0f0f0;
      --muted:        rgba(240,240,240,0.38);
      --muted-2:      rgba(240,240,240,0.58);
      --green:        #3ba55c;
      --font:         'JetBrains Mono', monospace;
      --font-display: 'Bodoni Moda', Georgia, serif;
    }

    /* =============================================
       RESET
    ============================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 1rem;
      overflow-x: hidden;
    }

    /* =============================================
       BACKGROUND
    ============================================= */
    #bg-wrap {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    #bg-video, #bg-image {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }

    #bg-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.74);
    }

    #bg-blur-layer {
      position: absolute;
      inset: 0;
      backdrop-filter: blur(3px);
    }

    /* =============================================
       GRAIN
    ============================================= */
    .grain {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      opacity: 0.05;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 160px;
    }

    /* =============================================
       MUSIC BUTTON
    ============================================= */
    #music-btn {
      position: fixed;
      top: 1.1rem; right: 1.1rem;
      z-index: 200;
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 1px solid var(--border-2);
      background: rgba(10,10,10,0.75);
      backdrop-filter: blur(14px);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--muted-2);
      transition: background .2s, color .2s;
    }
    #music-btn:hover { background: var(--surface-2); color: #fff; }
    #music-btn svg { width: 15px; height: 15px; }
    #music-btn.active { color: #fff; border-color: rgba(255,255,255,0.28); }
    #music-btn.active::before {
      content: '';
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.14);
      animation: pulse-ring 1.9s ease-out infinite;
    }
    @keyframes pulse-ring {
      0%   { transform: scale(1); opacity: .5; }
      100% { transform: scale(1.55); opacity: 0; }
    }

    /* =============================================
       CARD
    ============================================= */
    .page {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 400px;
    }

    .card {
      background: rgba(6,6,6,0.85);
      backdrop-filter: blur(40px) saturate(140%);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      box-shadow:
        0 0 0 .5px rgba(255,255,255,0.04),
        0 24px 72px rgba(0,0,0,.75),
        inset 0 1px 0 rgba(255,255,255,0.06);
      animation: fadeUp .65s cubic-bezier(.16,1,.3,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* =============================================
       BANNER
    ============================================= */
    .banner-wrap {
      position: relative;
      height: 108px;
      overflow: hidden;
      background: #111;
    }
    .banner-img {
      width: 100%; height: 100%;
      object-fit: cover;
      filter: brightness(.5) saturate(.6);
    }
    .banner-fade {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 64px;
      background: linear-gradient(to bottom, transparent, rgba(6,6,6,.92));
    }

    /* =============================================
       CARD BODY
    ============================================= */
    .card-body { padding: 0 1.6rem 1.6rem; }

    /* =============================================
       AVATAR
    ============================================= */
    .avatar-row { margin-top: -36px; margin-bottom: .9rem; }

    .avatar-img {
      width: 78px; height: 78px;
      border-radius: 50%;
      border: 3px solid rgba(6,6,6,1);
      object-fit: cover;
      display: block;
      background: #111;
    }

    /* =============================================
       NAME + STATUS
    ============================================= */
    .name-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: .45rem;
    }

    .username {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: .02em;
      line-height: 1;
      color: #fff;
      text-shadow:
        0 0 20px rgba(255,255,255,0.5),
        0 0 50px rgba(255,255,255,0.18),
        0 0 100px rgba(255,255,255,0.08);
    }

    .status-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px rgba(59,165,92,.7);
      flex-shrink: 0;
      margin-top: 2px;
    }

    /* =============================================
       TAGLINE (fade cycle, no typewriter)
    ============================================= */
    .tagline {
      font-size: .7rem;
      color: var(--muted-2);
      letter-spacing: .03em;
      min-height: 1.1em;
      margin-bottom: .9rem;
    }

    .tagline-item {
      display: none;
      animation: tagFade .45s cubic-bezier(.16,1,.3,1) both;
    }
    .tagline-item.active { display: inline; }

    @keyframes tagFade {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* =============================================
       BADGES
    ============================================= */
    .badges-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 1.1rem;
    }

    .badge {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px 3px 8px;
      border-radius: 6px;
      border: 1px solid var(--border);
      font-size: .62rem;
      font-family: var(--font);
      letter-spacing: .07em;
      text-transform: uppercase;
      color: var(--muted-2);
      background: var(--surface);
      overflow: hidden;
      white-space: nowrap;
    }
    .badge svg { width: 11px; height: 11px; flex-shrink: 0; }

    /* ── Verified: holographic light-reflection ── */
    .badge.verified {
      color: #93c5fd;
      border-color: rgba(147,197,253,.22);
      background: rgba(147,197,253,0.05);
    }
    /* Sweep of light */
    .badge.verified::before {
      content: '';
      position: absolute;
      top: 0; left: -80%;
      width: 55%;
      height: 100%;
      background: linear-gradient(
        108deg,
        transparent 20%,
        rgba(255,255,255,0.6) 40%,
        rgba(200,230,255,0.4) 50%,
        transparent 70%
      );
      transform: skewX(-18deg);
      animation: light-sweep 3s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes light-sweep {
      0%   { left: -80%; opacity: 0; }
      8%   { opacity: 1; }
      44%  { left: 130%; opacity: 1; }
      45%  { opacity: 0; }
      100% { left: 130%; opacity: 0; }
    }
    /* Iridescent edge glow */
    .badge.verified::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(
        90deg,
        rgba(147,197,253,0) 0%,
        rgba(196,181,253,0.1) 35%,
        rgba(147,197,253,0.14) 65%,
        rgba(167,243,208,0.07) 100%
      );
      background-size: 200% 100%;
      animation: iridescent 3.8s ease infinite;
    }
    @keyframes iridescent {
      0%   { background-position: 0% 0%; }
      50%  { background-position: 100% 0%; }
      100% { background-position: 0% 0%; }
    }

    .badge.dev     { color: #86efac; border-color: rgba(134,239,172,.2); background: rgba(134,239,172,0.04); }
    .badge.og      { color: #fcd34d; border-color: rgba(252,211,77,.2);  background: rgba(252,211,77,0.04); }
    .badge.premium { color: #c084fc; border-color: rgba(192,132,252,.2); background: rgba(192,132,252,0.04); }
    .badge.owner   { color: #fb923c; border-color: rgba(251,146,60,.2);  background: rgba(251,146,60,0.04); }

    /* =============================================
       DIVIDER
    ============================================= */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 1rem 0;
    }

    /* =============================================
       VIEWS BOX
    ============================================= */
    .views-box {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 1rem;
    }
    .views-left {
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
    }
    .views-left svg { width: 13px; height: 13px; }
    .views-label {
      font-size: .63rem;
      letter-spacing: .06em;
      text-transform: uppercase;
    }
    .views-num {
      font-size: .92rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -.02em;
    }

    /* =============================================
       SOCIAL ICON BUTTONS
    ============================================= */
    .socials-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .soc-btn {
      position: relative;
      width: 54px; height: 54px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      text-decoration: none;
      color: var(--muted-2);
      transition: background .2s, border-color .2s, transform .18s cubic-bezier(.16,1,.3,1), box-shadow .18s;
      overflow: visible;
    }

    .soc-btn svg {
      width: 22px; height: 22px;
      position: relative; z-index: 1;
      transition: transform .18s ease, color .18s;
    }

    .soc-btn:hover {
      background: var(--surface-2);
      border-color: var(--border-2);
      transform: translateY(-4px);
      box-shadow: 0 10px 28px rgba(0,0,0,.55);
    }

    .soc-btn:hover svg { transform: scale(1.08); }

    /* Brand accent on hover */
    .soc-btn.github:hover  { color: #fff; }
    .soc-btn.discord:hover { color: #7289da; }
    .soc-btn.tiktok:hover  { color: #fff; }
    .soc-btn.mail:hover    { color: #ea4335; }

    /* Tooltip */
    .soc-btn::after {
      content: attr(data-label);
      position: absolute;
      bottom: -22px;
      left: 50%; transform: translateX(-50%) translateY(2px);
      font-size: .59rem;
      font-family: var(--font);
      letter-spacing: .05em;
      color: var(--muted);
      white-space: nowrap;
      opacity: 0;
      transition: opacity .15s, transform .15s;
      pointer-events: none;
    }

    .soc-btn:hover::after {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* =============================================
       CARD FOOTER
    ============================================= */
    .card-foot {
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: .58rem;
      color: var(--muted);
      letter-spacing: .07em;
      text-transform: uppercase;
    }

    /* =============================================
       RESPONSIVE
    ============================================= */
    @media (max-width: 440px) {
      .card-body  { padding: 0 1.25rem 1.25rem; }
      .username   { font-size: 1.7rem; }
      .avatar-img { width: 68px; height: 68px; }
    }

    /* =============================================
       REDUCED MOTION
    ============================================= */
    @media (prefers-reduced-motion: reduce) {
      .card                  { animation: none; opacity: 1; }
      .tagline-item          { animation: none; }
      .badge.verified::before,
      .badge.verified::after,
      #music-btn.active::before { animation: none; }
    }
  </style>
</head>

/* ================================================================
   INIT
================================================================ */
document.addEventListener('DOMContentLoaded', () => {
  initBackground();
  initAvatar();
  initBadges();
  initViews();
  initSocials();
  initTaglineCycle();
  initMusic();
});

function initBackground() {
  const video = document.getElementById('bg-video');
  const image = document.getElementById('bg-image');
  if (CONFIG.videoUrl) {
    video.src = CONFIG.videoUrl; video.style.display = 'block'; image.style.display = 'none';
  } else if (CONFIG.imageUrl) {
    image.src = CONFIG.imageUrl; image.style.display = 'block'; video.style.display = 'none';
  } else {
    video.style.display = image.style.display = 'none';
  }
  const banner = document.getElementById('bannerImg');
  if (CONFIG.bannerUrl) { banner.src = CONFIG.bannerUrl; }
  else { document.getElementById('bannerWrap').style.display = 'none'; }
}

function initAvatar() {
  const img = document.getElementById('avatarImg');
  img.src = CONFIG.avatarUrl || `https://github.com/${CONFIG.githubUser}.png?size=200`;
  img.alt = `${CONFIG.username} avatar`;
}

function initBadges() {
  document.getElementById('badgesRow').innerHTML = CONFIG.badges.map(b => `
    <div class="badge ${b.type}" title="${b.label}">
      ${b.icon || BADGE_ICONS[b.type] || ''}
      <span>${b.label}</span>
    </div>
  `).join('');
}

function initViews() {
  const el = document.getElementById('views-count');
  const key = 'taaken-views';
  let count = parseInt(localStorage.getItem(key) || '0');
  if (!count || count < CONFIG.baseViews) count = CONFIG.baseViews;
  count++;
  localStorage.setItem(key, String(count));
  let current = Math.max(0, count - 60);
  const step = () => {
    current = Math.min(current + Math.ceil((count - current) * 0.13 + 1), count);
    el.textContent = current.toLocaleString('en-US');
    if (current < count) requestAnimationFrame(step);
  };
  requestAnimationFrame(step);
}

function initSocials() {
  document.getElementById('socialsRow').innerHTML = CONFIG.socials.map(s => `
    <a href="${s.url}" target="_blank" rel="noopener noreferrer"
       class="soc-btn ${s.icon}" aria-label="${s.label}" data-label="${s.label}">
      ${SOCIAL_ICONS[s.icon] || ''}
    </a>
  `).join('');
}

function initTaglineCycle() {
  const items = document.querySelectorAll('#taglineEl .tagline-item');
  let idx = 0;
  setInterval(() => {
    items[idx].classList.remove('active');
    idx = (idx + 1) % items.length;
    items[idx].classList.add('active');
  }, 3200);
}

function initMusic() {
  const btn   = document.getElementById('music-btn');
  const audio = document.getElementById('bg-music');
  if (!CONFIG.musicUrl) { btn.style.display = 'none'; return; }
  audio.src = CONFIG.musicUrl;
  audio.volume = 0.35;
  let playing = false;
  const iconM = document.getElementById('icon-mute');
  const iconP = document.getElementById('icon-play');
  function tryPlay() {
    audio.play().then(() => {
      playing = true; btn.classList.add('active');
      iconM.style.display = 'none'; iconP.style.display = '';
    }).catch(() => {});
  }
  let started = false;
  const onFirst = () => {
    if (started) return; started = true; tryPlay();
    document.removeEventListener('click', onFirst);
    document.removeEventListener('keydown', onFirst);
  };
  document.addEventListener('click', onFirst);
  document.addEventListener('keydown', onFirst);
  btn.addEventListener('click', e => {
    e.stopPropagation();
    if (playing) {
      audio.pause(); playing = false; btn.classList.remove('active');
      iconM.style.display = ''; iconP.style.display = 'none';
    } else { tryPlay(); }
  });
}
</script>
